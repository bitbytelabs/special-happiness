name: Fishtest Worker

on:
  workflow_dispatch:

jobs:
  fishtest:
    runs-on: ubuntu-latest

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            python3 \
            python3-venv \
            python3-pip \
            build-essential \
            g++ \
            clang \
            llvm \
            make

      - name: Clone Fishtest repository
        run: |
          if [ ! -d "fishtest" ]; then
            git clone https://github.com/official-stockfish/fishtest.git
          fi

      - name: Run Fishtest Worker
        env:
          FISHTEST_USER: ${{ secrets.FISHTEST_USER }}
          FISHTEST_PASS: ${{ secrets.FISHTEST_PASS }}
        run: |
          cd fishtest/worker

          # Safe concurrency: leave 1 CPU core free
          CORES=$(nproc)
          SAFE_CORES=$((CORES-1))
          if [ $SAFE_CORES -lt 1 ]; then
            SAFE_CORES=1
          fi

          # Use 80% of available RAM
          MEMORY=$(free -m | awk '/Mem:/ {print int($2*0.8)}')

          echo "Detected $CORES cores, using $SAFE_CORES"
          echo "Using ${MEMORY}MB RAM"

          python3 worker.py \
            --username "$FISHTEST_USER" \
            --password "$FISHTEST_PASS" \
            --concurrency "$SAFE_CORES" \
            --memory "$MEMORY"
