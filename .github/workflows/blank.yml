name: Fishtest Worker

on:
  workflow_dispatch:

jobs:
  fishtest:
    runs-on: ubuntu-latest

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            g++ \
            clang \
            llvm \
            make

      - name: Clone Fishtest repository (if not already present)
        run: |
          if [ ! -d "fishtest" ]; then
            git clone https://github.com/official-stockfish/fishtest.git
          fi

      - name: Run Fishtest Worker
        env:
          FISHTEST_USER: ${{ secrets.FISHTEST_USER }}
          FISHTEST_PASS: ${{ secrets.FISHTEST_PASS }}
        run: |
          cd fishtest/worker

          # Detect cores and leave 1 core free
          CORES=$(nproc)
          SAFE_CORES=$((CORES-1))
          if [ "$SAFE_CORES" -lt 1 ]; then
            SAFE_CORES=1
          fi

          echo "Detected $CORES cores, using $SAFE_CORES"

          # Run worker (USERNAME and PASSWORD are positional args)
          python3 worker.py \
            "$FISHTEST_USER" \
            "$FISHTEST_PASS" \
            --concurrency "$SAFE_CORES"
